<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toDo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <form class="todo-form" action="">
            <input id="input" type="text" placeholder="Добавить здачу">
            <button class="btn-add">Добавить +</button>
        </form>
        <div class="btnFilterBox">
            <button class="btnAllActiveTasks active">Надо выполнить</button>
            <button class="btnDoneTasks">Выполнено </button>
        </div>
        <ul class="list"></ul>
    </div>
    <script src="todo.js"></script>
</body>

</html>
